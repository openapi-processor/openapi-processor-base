name: build

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'gradle.properties'
      - 'LICENSE'
      - 'README.adoc'
      - 'docs/**'
    tags-ignore:
      - 'v*'
  workflow_dispatch:

jobs:

  version:
    name: check version
    runs-on: ubuntu-latest
    outputs:
      BUILD_VERSION: ${{ env.BUILD_VERSION }}
      BUILD_SNAPSHOT: ${{ env.BUILD_SNAPSHOT }}

    steps:
      - name: get version
        id: get-version
        uses: openapi-processor/openapi-processor-base/.github/actions/version@main
        with:
          version-file: 'gradle/libs.versions.toml'
          version-path: 'versions.processor'

      - name: set output version
        shell: bash
        run: |
          echo BUILD_VERSION="${{steps.get-version.outputs.version}}" >> $GITHUB_ENV
          echo BUILD_SNAPSHOT="${{steps.get-version.outputs.snapshot}}" >> $GITHUB_ENV
          cat $GITHUB_ENV

  check-publish:
    needs: [version]
    name: check publish

    runs-on: ubuntu-latest
    if: >-
      github.actor != 'dependabot[bot]' &&
      github.actor == 'hauner' && contains(needs.version.outputs.BUILD_VERSION, 'SNAPSHOT')

    steps:
      - run: |
          echo "should publish ..."
          echo version BUILD_VERSION ${{needs.version.outputs.BUILD_VERSION}}
          echo version BUILD_SNAPSHOT ${{needs.version.outputs.BUILD_SNAPSHOT}}

  test:
    name: test

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        submodules: true

    - name: set up jdk
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 17

    - name: set up gradle
      uses: gradle/actions/setup-gradle@v6

    - name: run tests
      run: |
        ./gradlew javaToolchains check --stacktrace
#        -Dorg.gradle.configuration-cache.read-only=true

    - name: archive test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results-${{ matrix.os }}
        path: '*/build/reports'

  publish:
    needs: [check-publish, test]
    name: publish snapshot

    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: set up jdk
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 17

    - name: set up gradle
      uses: gradle/actions/setup-gradle@v6

    - name: publish snapshot
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ORG_GRADLE_PROJECT_signKey: ${{ secrets.SIGN_KEY }}
        ORG_GRADLE_PROJECT_signPwd: ${{ secrets.SIGN_PWD }}
        PUBLISH_USER: ${{ secrets.PUBLISH_USER }}
        PUBLISH_KEY: ${{ secrets.PUBLISH_KEY }}
      run: |
        ./gradlew publishToMavenCentral --stacktrace
#        -Dorg.gradle.configuration-cache.read-only=true

  sonar:
    needs: [publish]
    name: sonar

    runs-on: ubuntu-latest

    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: cache sonar
      uses: actions/cache@v5
      with:
        path: |
          ~/.sonar/cache
        key: sonar-${{ runner.os }}
        restore-keys: |
          sonar-${{ runner.os }}

    - name: set up jdk
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: 17

    - name: set up gradle
      uses: gradle/actions/setup-gradle@v6

    - name: run sonar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        ./gradlew check sonar --stacktrace
#        -Dorg.gradle.configuration-cache.read-only=true
